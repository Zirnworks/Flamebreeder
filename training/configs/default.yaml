# FastGAN Training Configuration

# Model
latent_dim: 256
image_size: 512
gen_base_channels: 256
disc_base_channels: 16

# Training
batch_size: 8
gradient_accumulate_every: 4
num_train_steps: 150000
learning_rate_g: 0.0002
learning_rate_d: 0.0002
betas: [0.5, 0.999]
recon_weight: 0.5

# EMA
ema_decay: 0.999

# Augmentation
aug_ops: ["color", "translation", "cutout"]
aug_prob: 0.5

# Checkpointing
save_every: 2000
evaluate_every: 2000
sample_every: 500
sample_grid_size: 8

# FID
fid_num_images: 5000

# Paths
dataset_path: "../datagen/data/processed"
checkpoint_dir: "checkpoints"
sample_dir: "samples"
log_dir: "logs"

# Device
device: "mps"
num_workers: 4
